<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cookie Clicker</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #333; color: white; }
        #cookie { font-size: 100px; cursor: pointer; user-select: none; }
    </style>
</head>
<body>
    <h1>Cookies: <span id="count">0</span></h1>
    <div id="cookie">🍪</div>
<script>
    let cookies = 0;
    document.getElementById('cookie').onclick = () => {
        cookies++;
        document.getElementById('count').innerText = cookies;
    };
</script>
</body>
</html>
