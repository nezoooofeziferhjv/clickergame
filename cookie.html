<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cookie Clicker Ultra</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background: #2c3e50; color: white; display: flex; height: 100vh; }
        
        /* Côté GAUCHE : Le Cookie */
        .game { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(#34495e, #2c3e50); }
        #cookie { 
            width: 200px; height: 200px; background: #d2691e; border-radius: 50%; 
            border: 8px solid #8b4513; cursor: pointer; position: relative;
            box-shadow: 0 10px 0 #8b4513, 0 20px 30px rgba(0,0,0,0.5);
            transition: transform 0.05s; user-select: none;
        }
        #cookie:active { transform: translateY(5px); box-shadow: 0 5px 0 #8b4513, 0 10px 20px rgba(0,0,0,0.5); }
        /* Pépites de chocolat */
        .dot { position: absolute; background: #3d1f05; border-radius: 50%; width: 20px; height: 20px; }

        .score-board { text-align: center; margin-bottom: 20px; }
        .score-board h1 { font-size: 3rem; margin: 0; color: #f1c40f; }

        /* Côté DROIT : Boutique */
        .shop { width: 300px; background: #1a252f; padding: 20px; border-left: 5px solid #f1c40f; overflow-y: auto; }
        .item { 
            background: #34495e; padding: 15px; margin-bottom: 10px; border-radius: 8px; 
            cursor: pointer; display: flex; justify-content: space-between; border: 2px solid transparent;
        }
        .item:hover { border-color: #f1c40f; }
        .item.disabled { opacity: 0.5; cursor: not-allowed; }
        
        .particle { position: absolute; color: #f1c40f; font-weight: bold; pointer-events: none; animation: fly 0.8s linear forwards; }
        @keyframes fly { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="game">
        <div class="score-board">
            <h1 id="total">0</h1>
            <p>CPS: <span id="cps">0</span></p>
        </div>
        <div id="cookie">
            <!-- Pépites en CSS -->
            <div class="dot" style="top:20%; left:30%"></div>
            <div class="dot" style="top:50%; left:20%"></div>
            <div class="dot" style="top:70%; left:50%"></div>
            <div class="dot" style="top:30%; left:60%"></div>
            <div class="dot" style="top:60%; left:75%"></div>
        </div>
    </div>

    <div class="shop">
        <h3>Boutique</h3>
        <div id="items-list"></div>
        <button onclick="reset()" style="margin-top:20px; background:red; color:white; border:none; padding:10px; cursor:pointer; width:100%">RESET</button>
    </div>

<script>
    let score = 0;
    let autoClickers = 0;
    let shopItems = [
        { id: 1, name: "Clic Auto", cost: 15, power: 1, count: 0 },
        { id: 2, name: "Super Clic", cost: 100, power: 5, count: 0 },
        { id: 3, name: "Usine", cost: 500, power: 20, count: 0 }
    ];

    const totalEl = document.getElementById('total');
    const cpsEl = document.getElementById('cps');
    const cookieBtn = document.getElementById('cookie');
    const itemsList = document.getElementById('items-list');

    // Chargement de la sauvegarde
    const saved = JSON.parse(localStorage.getItem('cookieSave'));
    if (saved) {
        score = saved.score;
        shopItems = saved.shopItems;
    }

    function update() {
        totalEl.innerText = Math.floor(score);
        let totalCPS = shopItems.reduce((acc, item) => acc + (item.count * item.power), 0);
        cpsEl.innerText = totalCPS.toFixed(1);
        
        // Affichage Boutique
        itemsList.innerHTML = '';
        shopItems.forEach((item, index) => {
            let div = document.createElement('div');
            div.className = `item ${score < item.cost ? 'disabled' : ''}`;
            div.innerHTML = `<div><b>${item.name}</b><br>Coût: ${Math.floor(item.cost)}</div> <div>x${item.count}</div>`;
            div.onclick = () => buy(index);
            itemsList.appendChild(div);
        });
        
        // Sauvegarde
        localStorage.setItem('cookieSave', JSON.stringify({score, shopItems}));
    }

    function buy(index) {
        if (score >= shopItems[index].cost) {
            score -= shopItems[index].cost;
            shopItems[index].count++;
            shopItems[index].cost *= 1.2;
            update();
        }
    }

    cookieBtn.onclick = (e) => {
        score++;
        // Petite animation +1
        let p = document.createElement('div');
        p.className = 'particle';
        p.style.left = e.pageX + 'px';
        p.style.top = e.pageY + 'px';
        p.innerText = "+1";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        update();
    };

    function reset() {
        if(confirm("Effacer tout ?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // Boucle de gain auto (chaque seconde)
    setInterval(() => {
        let gain = shopItems.reduce((acc, item) => acc + (item.count * item.power), 0);
        score += gain / 10; // On divise par 10 car l'intervalle est de 100ms
        update();
    }, 100);

    update();
</script>
</body>
</html>
